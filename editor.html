<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ram Incremental 地图编辑器</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Monaco', monospace;
            background: #1e1f2c;
            color: #eef;
        }

        /* 主布局 */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* 工具栏 */
        .toolbar {
            background: #2d2f3e;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #4a4d64;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .toolbar button,
        .toolbar label,
        .toolbar input {
            background: #3c3f55;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.1s;
            font-family: inherit;
        }

        .toolbar button:hover {
            background: #5b5f82;
            transform: scale(0.98);
        }

        .toolbar input {
            background: #252736;
            cursor: text;
            width: 140px;
        }

        .toolbar .sep {
            width: 1px;
            height: 28px;
            background: #5a5e7a;
            margin: 0 4px;
        }

        .coord-input {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .coord-input input {
            width: 80px;
            text-align: center;
        }

        .zoom-level {
            background: #1e1f2c;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 13px;
            font-family: monospace;
        }

        /* 主区域: canvas + 侧边栏 */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .canvas-container {
            flex: 1;
            background: #181a25;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #232536;
            cursor: crosshair;
        }

        /* 右侧编辑面板 */
        .side-panel {
            width: 320px;
            background: #2a2c3c;
            border-left: 1px solid #4a4d64;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
            gap: 16px;
            font-size: 13px;
        }

        .panel-section {
            background: #1f2130;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 6px black;
        }

        .panel-section h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-left: 4px solid #7c7eff;
            padding-left: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .info-row span:first-child {
            color: #b9c3e9;
        }

        select,
        textarea,
        input {
            width: 100%;
            background: #10121c;
            border: 1px solid #5f6a8a;
            color: #f0f0f0;
            padding: 8px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            margin-top: 4px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .action-buttons button {
            flex: 1;
            background: #3f4270;
            border: none;
            padding: 8px;
            border-radius: 20px;
            font-weight: bold;
        }

        .delete-btn {
            background: #7a3e4a;
        }

        .delete-btn:hover {
            background: #a14b5c;
        }

        .current-tile-preview {
            background: #0f0f1a;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-family: monospace;
            word-break: break-all;
        }

        hr {
            border-color: #4a4d64;
        }

        .badge {
            background: #3c3f55;
            border-radius: 16px;
            padding: 2px 8px;
            font-size: 11px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            background: #1e1f2c;
        }

        ::-webkit-scrollbar-thumb {
            background: #6c6f92;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="toolbar">
            <button id="loadBtn">📂 加载JSON</button>
            <button id="saveBtn">💾 导出地图</button>
            <div class="sep"></div>
            <div class="coord-input">
                <span>📍 跳转</span>
                <input type="number" id="gotoX" placeholder="X" value="13">
                <input type="number" id="gotoY" placeholder="Y" value="1">
                <button id="gotoBtn">前往</button>
            </div>
            <div class="sep"></div>
            <div>
                <span>🔍 缩放 </span>
                <button id="zoomOutBtn">-</button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button id="zoomInBtn">+</button>
                <button id="resetViewBtn">重置视图</button>
            </div>
            <div class="sep"></div>
            <div class="badge" id="tileCountDisplay">图块数量: --</div>
            <div style="flex:1"></div>
            <span>✏️ 单击格子选中 | 拖拽平移 (鼠标中键/右键拖拽)</span>
        </div>

        <div class="main-area">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="mapCanvas"></canvas>
            </div>
            <div class="side-panel" id="sidePanel">
                <div class="panel-section">
                    <h3>📌 当前选中</h3>
                    <div class="info-row"><span>坐标:</span><span id="selectedCoord">( - , - )</span></div>
                    <div class="info-row"><span>类型:</span><input type="text" id="tileType"
                            placeholder="如 WALL, TEXT?, DOOR?UP" list="typeSuggestions"></div>
                    <datalist id="typeSuggestions">
                        <option>WALL</option>
                        <option>TEXT?</option>
                        <option>DOOR?</option>
                        <option>FEAT?</option>
                        <option>FEAT2?</option>
                        <option>FEAT3?</option>
                        <option>ITEM?</option>
                        <option>NPC?</option>
                        <option>POINTS</option>
                        <option>RAM</option>
                        <option>HARDRESET</option>
                        <option>TP?</option>
                        <option>COLORFUL?</option>
                        <option>HARDRESET2</option>
                    </datalist>
                    <div class="info-row"><span>完整参数:</span></div>
                    <textarea id="tileRaw" rows="3" placeholder="原始值如: TEXT?你好世界\n第二行"></textarea>
                    <div class="action-buttons">
                        <button id="updateTileBtn">✅ 更新 / 添加</button>
                        <button id="deleteTileBtn" class="delete-btn">🗑️ 删除(变成空地)</button>
                    </div>
                </div>
                <div class="panel-section">
                    <h3>📖 帮助</h3>
                    <div style="font-size:12px; line-height:1.5">
                        • 墙壁WALL 灰色不可通行<br>
                        • TEXT?文本 多行用\n分割<br>
                        • DOOR?方向/id 控制门<br>
                        • FEAT?/ITEM?/NPC? 任意参数<br>
                        • 空单元格表示可通行地面<br>
                        • 直接编辑原始字符串, 格式必须符合引擎规则<br>
                        • 支持所有自定义类型前缀如 COLORFUL?#ff6600
                    </div>
                    <hr>
                    <div>💡 提示: 鼠标滚轮缩放, 左键拖拽移动地图, 点击格子编辑</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- 地图数据存储 ----------
        // 使用 Map key = "x,y" , value = { raw: string, typePrefix: string, full: string }
        // 为了导出时完全保留原始字符串，我们只存储 rawString
        let tileMap = new Map(); // key: "x,y" , value: rawString 例如 "WALL" , "TEXT?欢迎来到\nRam\nIncremental"

        // 视图控制变量
        let canvas = document.getElementById('mapCanvas');
        let container = document.getElementById('canvasContainer');
        let ctx = canvas.getContext('2d');

        let offsetX = 0, offsetY = 0;    // 视口左上角对应的世界坐标 (格坐标)
        let scale = 1.0;                 // 渲染缩放 (格子大小 = baseTileSize * scale)
        const BASE_TILE_SIZE = 32;

        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        let lastOffset = { x: 0, y: 0 };

        let selectedTileX = null, selectedTileY = null;

        // UI 元素绑定
        const selectedCoordSpan = document.getElementById('selectedCoord');
        const tileTypeInput = document.getElementById('tileType');
        const tileRawTextarea = document.getElementById('tileRaw');
        const updateBtn = document.getElementById('updateTileBtn');
        const deleteBtn = document.getElementById('deleteTileBtn');
        const loadBtn = document.getElementById('loadBtn');
        const saveBtn = document.getElementById('saveBtn');
        const gotoBtn = document.getElementById('gotoBtn');
        const gotoX = document.getElementById('gotoX');
        const gotoY = document.getElementById('gotoY');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const resetViewBtn = document.getElementById('resetViewBtn');
        const zoomLevelSpan = document.getElementById('zoomLevel');
        const tileCountDisplay = document.getElementById('tileCountDisplay');

        // ---------- 辅助函数 ----------
        function updateTileCountDisplay() {
            tileCountDisplay.innerText = `图块数量: ${tileMap.size}`;
        }

        // 从原始字符串解析 类型前缀 (第一个 ? 之前的部分，若没有?则整体当作类型)
        function getTypeFromRaw(raw) {
            if (!raw) return "EMPTY";
            let qIndex = raw.indexOf('?');
            if (qIndex === -1) return raw;
            return raw.substring(0, qIndex);
        }

        // 将当前地图数据转换成 原始数组格式 [[x,y,value],...]
        function exportToArray() {
            const arr = [];
            for (let [key, rawVal] of tileMap.entries()) {
                const [x, y] = key.split(',').map(Number);
                arr.push([x, y, rawVal]);
            }
            // 可选排序 (按x,y)
            arr.sort((a, b) => {
                if (a[0] !== b[0]) return a[0] - b[0];
                return a[1] - b[1];
            });
            return arr;
        }

        // 从标准数组加载地图
        function loadFromArray(dataArray) {
            tileMap.clear();
            for (let item of dataArray) {
                if (item.length >= 3) {
                    const x = item[0], y = item[1];
                    const raw = String(item[2]);
                    tileMap.set(`${x},${y}`, raw);
                }
            }
            updateTileCountDisplay();
            renderCanvas();
            // 清空选中
            selectedTileX = selectedTileY = null;
            updateSelectedPanel(null);
        }

        // 加载默认示例数据 (直接使用内置mapdata)
        function loadDefaultMap() {
            // 原始数据太长但我们已经有一个文件内容, 这里直接内嵌？为了可靠，手动解析提供的样例数据的一个子集？
            // 由于实际提供的mapdata.json很大，编辑器应该能够导入该文件。为了展示，直接使用硬编码示例不现实。
            // 但我们可以先用一个最小的示例确保功能可视，再提供"加载JSON"按钮让用户选择提供的文件。
            // 更好的方式：初始化一个空白地图？但为了演示，先加载样例中的几个基础坐标，让用户导入真正文件。
            // 为了编辑器开箱即用，我们通过fetch加载同目录? 由于独立html, 可以定义默认展示简单样例，但为了匹配需求，直接提供一个内置简化示例（十字路口）
            // 但用户只需要点击加载按钮加载给出的 mapdata.json 即可。因此默认初始化用一个小样例，然后提示。
            const minimalDemo = [
                [2, 1, "TEXT?欢迎来到\nRam\nIncremental"],
                [2, 2, "TEXT?按上下左右键移动"],
                [3, 2, "TEXT?白色方块是墙"],
                [0, 0, "WALL"], [1, 0, "WALL"], [0, 1, "WALL"], [1, 1, "WALL"],
                [13, 1, "TEXT?十字路口"],
                [13, 2, "TEXT?先去下方"],
                [8, 2, "TEXT?下方可以去设置"],
                [14, 10, "POINTS"],
                [13, 12, "RAM"]
            ];
            loadFromArray(minimalDemo);
            // 重置视图到中心区域
            resetView();
        }

        // 渲染画布
        function renderCanvas() {
            if (!canvas || !ctx) return;
            const containerRect = container.getBoundingClientRect();
            const w = containerRect.width;
            const h = containerRect.height;
            canvas.width = w;
            canvas.height = h;
            if (w === 0 || h === 0) return;

            ctx.clearRect(0, 0, w, h);
            const tileSize = BASE_TILE_SIZE * scale;
            if (tileSize < 1) return;

            // 计算可见范围
            const startCol = Math.floor(-offsetX / tileSize);
            const endCol = Math.ceil((w - offsetX) / tileSize);
            const startRow = Math.floor(-offsetY / tileSize);
            const endRow = Math.ceil((h - offsetY) / tileSize);

            // 优化边界
            for (let row = startRow - 1; row <= endRow + 1; row++) {
                for (let col = startCol - 1; col <= endCol + 1; col++) {
                    const worldX = col;
                    const worldY = row;
                    const screenX = offsetX + col * tileSize;
                    const screenY = offsetY + row * tileSize;
                    if (screenX + tileSize < 0 || screenY + tileSize < 0 || screenX > w || screenY > h) continue;

                    const key = `${worldX},${worldY}`;
                    const raw = tileMap.get(key);
                    const isEmpty = !raw;
                    // 绘制背景 (空地浅色)
                    if (isEmpty) {
                        ctx.fillStyle = "#3a3c4e";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.strokeStyle = "#2a2c3c";
                        ctx.strokeRect(screenX, screenY, tileSize, tileSize);
                        // 加点网格线
                        ctx.beginPath();
                        ctx.strokeStyle = "#2f3348";
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(screenX, screenY, tileSize, tileSize);
                        continue;
                    }

                    // 绘制有内容的格
                    const typePrefix = getTypeFromRaw(raw);
                    // 根据类型着色
                    if (typePrefix === "WALL") {
                        ctx.fillStyle = "#5c6079";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#cdd4ff";
                        ctx.font = `bold ${Math.max(12, tileSize * 0.35)}px monospace`;
                        ctx.fillText("⬛", screenX + tileSize * 0.25, screenY + tileSize * 0.7);
                    }
                    else if (typePrefix === "TEXT") {
                        ctx.fillStyle = "#e3d9a8";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#2a2b3c";
                        ctx.font = `${Math.max(11, tileSize * 0.3)}px monospace`;
                        ctx.fillText("📄", screenX + 4, screenY + tileSize * 0.7);
                    }
                    else if (typePrefix === "DOOR") {
                        ctx.fillStyle = "#b89a6b";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#2d1f0c";
                        ctx.font = `${Math.max(12, tileSize * 0.35)}px monospace`;
                        ctx.fillText("🚪", screenX + tileSize * 0.2, screenY + tileSize * 0.7);
                    }
                    else if (typePrefix === "FEAT" || typePrefix === "FEAT2" || typePrefix === "FEAT3") {
                        ctx.fillStyle = "#7d6d8f";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#f1e7ff";
                        ctx.font = `${Math.max(12, tileSize * 0.35)}px monospace`;
                        ctx.fillText("⚡", screenX + tileSize * 0.3, screenY + tileSize * 0.7);
                    }
                    else if (typePrefix === "ITEM") {
                        ctx.fillStyle = "#4d9e7c";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#fff1b5";
                        ctx.font = `${Math.max(12, tileSize * 0.35)}px monospace`;
                        ctx.fillText("🎁", screenX + tileSize * 0.25, screenY + tileSize * 0.7);
                    }
                    else if (typePrefix === "NPC") {
                        ctx.fillStyle = "#5680a7";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#ffffff";
                        ctx.font = `${Math.max(12, tileSize * 0.35)}px monospace`;
                        ctx.fillText("🧑", screenX + tileSize * 0.25, screenY + tileSize * 0.7);
                    }
                    else if (typePrefix === "POINTS") {
                        ctx.fillStyle = "#f4b942";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#1e1e2a";
                        ctx.font = `${Math.max(12, tileSize * 0.35)}px monospace`;
                        ctx.fillText("★", screenX + tileSize * 0.3, screenY + tileSize * 0.7);
                    }
                    else if (typePrefix === "RAM") {
                        ctx.fillStyle = "#50b0b0";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#112222";
                        ctx.font = `${Math.max(11, tileSize * 0.35)}px monospace`;
                        ctx.fillText("💾", screenX + tileSize * 0.25, screenY + tileSize * 0.7);
                    }
                    else if (typePrefix === "COLORFUL") {
                        let colorMatch = raw.match(/COLORFUL\?#([0-9a-fA-F]{6})/);
                        let fillCol = "#aa88ff";
                        if (colorMatch) fillCol = "#" + colorMatch[1];
                        ctx.fillStyle = fillCol;
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "white";
                        ctx.font = `${Math.max(12, tileSize * 0.35)}px monospace`;
                        ctx.fillText("🎨", screenX + tileSize * 0.3, screenY + tileSize * 0.7);
                    }
                    else {
                        ctx.fillStyle = "#6c6480";
                        ctx.fillRect(screenX, screenY, tileSize, tileSize);
                        ctx.fillStyle = "#ffffff";
                        ctx.font = `${Math.max(10, tileSize * 0.3)}px monospace`;
                        ctx.fillText("?", screenX + tileSize * 0.4, screenY + tileSize * 0.7);
                    }

                    // 描边+选中高亮
                    ctx.strokeStyle = "#33363f";
                    ctx.lineWidth = 0.8;
                    ctx.strokeRect(screenX, screenY, tileSize, tileSize);

                    // 添加小文字显示类型简写
                    ctx.fillStyle = "#f9f9fc";
                    ctx.font = `${Math.max(9, tileSize * 0.22)}px monospace`;
                    let short = typePrefix.substring(0, 3);
                    ctx.fillText(short, screenX + 2, screenY + tileSize - 3);
                }
            }

            // 绘制选中的边框
            if (selectedTileX !== null && selectedTileY !== null) {
                const sx = offsetX + selectedTileX * tileSize;
                const sy = offsetY + selectedTileY * tileSize;
                if (sx + tileSize > 0 && sx < w && sy + tileSize > 0 && sy < h) {
                    ctx.save();
                    ctx.strokeStyle = "#ffd966";
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 0;
                    ctx.strokeRect(sx + 1, sy + 1, tileSize - 2, tileSize - 2);
                    ctx.restore();
                }
            }
        }

        // 屏幕坐标转世界格子
        function screenToTile(screenX, screenY) {
            const rect = canvas.getBoundingClientRect();
            const canvasX = (screenX - rect.left) * (canvas.width / rect.width);
            const canvasY = (screenY - rect.top) * (canvas.height / rect.height);
            const tileSize = BASE_TILE_SIZE * scale;
            const worldX = Math.floor((canvasX - offsetX) / tileSize);
            const worldY = Math.floor((canvasY - offsetY) / tileSize);
            return { x: worldX, y: worldY };
        }

        // 更新右侧面板
        function updateSelectedPanel(tile) {
            if (tile && tile.x !== undefined && tile.y !== undefined) {
                selectedTileX = tile.x;
                selectedTileY = tile.y;
                const key = `${selectedTileX},${selectedTileY}`;
                const raw = tileMap.get(key) || "";
                selectedCoordSpan.innerText = `(${selectedTileX}, ${selectedTileY})`;
                tileRawTextarea.value = raw;
                if (raw) {
                    tileTypeInput.value = getTypeFromRaw(raw);
                } else {
                    tileTypeInput.value = "空地(无数据)";
                }
            } else {
                selectedTileX = null;
                selectedTileY = null;
                selectedCoordSpan.innerText = "(未选中)";
                tileRawTextarea.value = "";
                tileTypeInput.value = "";
            }
        }

        // 保存当前格子编辑
        function saveCurrentTile() {
            if (selectedTileX === null || selectedTileY === null) {
                alert("请先点击选中一个格子");
                return;
            }
            let newRaw = tileRawTextarea.value.trim();
            const forcedType = tileTypeInput.value.trim();
            // 如果用户修改原始字符串为空，则删除此格子
            if (newRaw === "") {
                deleteCurrentTile();
                return;
            }
            // 额外：确保类型前缀粗略合法性，但保持用户输入
            tileMap.set(`${selectedTileX},${selectedTileY}`, newRaw);
            updateTileCountDisplay();
            renderCanvas();
            updateSelectedPanel({ x: selectedTileX, y: selectedTileY }); // 刷新面板显示新raw
        }

        function deleteCurrentTile() {
            if (selectedTileX === null || selectedTileY === null) return;
            const key = `${selectedTileX},${selectedTileY}`;
            tileMap.delete(key);
            updateTileCountDisplay();
            renderCanvas();
            updateSelectedPanel(null);
            selectedTileX = selectedTileY = null;
        }

        // 视图功能
        function setScale(newScale) {
            scale = Math.min(4.0, Math.max(0.25, newScale));
            zoomLevelSpan.innerText = `${Math.round(scale * 100)}%`;
            renderCanvas();
        }

        function panTo(centerX, centerY) {
            const containerRect = container.getBoundingClientRect();
            const centerScreenX = containerRect.width / 2;
            const centerScreenY = containerRect.height / 2;
            const tileSize = BASE_TILE_SIZE * scale;
            offsetX = centerScreenX - centerX * tileSize;
            offsetY = centerScreenY - centerY * tileSize;
            renderCanvas();
        }

        function resetView() {
            scale = 1.0;
            // 尝试定位到 (13,1) 附近
            panTo(13, 1);
            zoomLevelSpan.innerText = `100%`;
            renderCanvas();
        }

        function gotoCoordinate(x, y) {
            panTo(x, y);
            renderCanvas();
        }

        // 鼠标交互
        function initMouseEvents() {
            let isDragging = false;
            let lastMouseX = 0, lastMouseY = 0;

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                let newScale = scale + delta;
                newScale = Math.min(4.0, Math.max(0.3, newScale));
                if (newScale !== scale) {
                    // 以鼠标位置为中心缩放
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    const beforeTileSize = BASE_TILE_SIZE * scale;
                    const worldX = (mouseX - offsetX) / beforeTileSize;
                    const worldY = (mouseY - offsetY) / beforeTileSize;
                    scale = newScale;
                    const afterTileSize = BASE_TILE_SIZE * scale;
                    offsetX = mouseX - worldX * afterTileSize;
                    offsetY = mouseY - worldY * afterTileSize;
                    renderCanvas();
                    zoomLevelSpan.innerText = `${Math.round(scale * 100)}%`;
                }
            });

            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0) { // 左键: 选中
                    const { x, y } = screenToTile(e.clientX, e.clientY);
                    updateSelectedPanel({ x, y });
                    renderCanvas();
                    e.preventDefault();
                }
                else if (e.button === 1 || e.button === 2) { // 中键/右键 拖拽平移
                    isDragging = true;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    canvas.style.cursor = 'grabbing';
                    e.preventDefault();
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const dx = e.clientX - lastMouseX;
                    const dy = e.clientY - lastMouseY;
                    offsetX += dx;
                    offsetY += dy;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    renderCanvas();
                    e.preventDefault();
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (isDragging) {
                    isDragging = false;
                    canvas.style.cursor = 'crosshair';
                    e.preventDefault();
                }
            });

            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        // 导入导出文件
        function exportFile() {
            const dataArray = exportToArray();
            const jsonStr = JSON.stringify(dataArray, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mapdata_edited.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importFile(file) {
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const json = JSON.parse(evt.target.result);
                    if (Array.isArray(json)) {
                        loadFromArray(json);
                        resetView();
                        alert(`导入成功，共 ${tileMap.size} 个图块`);
                    } else {
                        alert("无效地图数据: 不是数组");
                    }
                } catch (e) {
                    alert("解析JSON失败: " + e.message);
                }
            };
            reader.readAsText(file);
        }

        // 监听更新、删除
        updateBtn.addEventListener('click', saveCurrentTile);
        deleteBtn.addEventListener('click', deleteCurrentTile);

        loadBtn.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                if (e.target.files.length) importFile(e.target.files[0]);
            };
            input.click();
        });

        saveBtn.addEventListener('click', exportFile);
        gotoBtn.addEventListener('click', () => {
            let x = parseInt(gotoX.value, 10);
            let y = parseInt(gotoY.value, 10);
            if (isNaN(x)) x = 0;
            if (isNaN(y)) y = 0;
            gotoCoordinate(x, y);
        });

        zoomInBtn.addEventListener('click', () => setScale(scale + 0.2));
        zoomOutBtn.addEventListener('click', () => setScale(scale - 0.2));
        resetViewBtn.addEventListener('click', resetView);

        // 监听窗口尺寸变化
        window.addEventListener('resize', () => {
            renderCanvas();
        });

        function setupCanvasResizeObserver() {
            const resizeObserver = new ResizeObserver(() => {
                renderCanvas();
            });
            resizeObserver.observe(container);
        }

        // 初始化地图默认数据（轻量级演示，用户可加载原文件）
        function init() {
            loadDefaultMap();
            initMouseEvents();
            setupCanvasResizeObserver();
            renderCanvas();
        }

        init();
    </script>
</body>

</html>
